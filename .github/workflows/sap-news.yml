name: Daily SAP News

on:
  schedule:
    - cron: "35 6 * * *"   # 6:35 UTC = 7:35 AM BST (UTC+1), 10 min after main news
  workflow_dispatch:

jobs:
  send-sap-news:
    uses: ./.github/workflows/_run-digest.yml
    secrets: inherit
    with:
      digest_name: "Daily SAP News"
      script_path: "sap_news.py"
