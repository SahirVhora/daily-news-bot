name: Daily Top News

on:
  schedule:
    # Every day at 7:00 AM UTC (8 AM BST / UK time)
    - cron: '0 7 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  send-news:
    uses: ./.github/workflows/_run-digest.yml
    secrets: inherit
    with:
      digest_name: "Daily Top News"
      script_path: "top_news.py"
      install_command: "pip install feedparser requests"
