name: Daily X/Twitter Trends

on:
  schedule:
    - cron: "45 6 * * *"   # 6:45 UTC = 7:45 AM BST (UTC+1)
  workflow_dispatch:

jobs:
  send-x-trends:
    uses: ./.github/workflows/_run-digest.yml
    secrets: inherit
    with:
      digest_name: "Daily X/Twitter Trends"
      script_path: "x_trends.py"
