name: Daily GitHub Trending

on:
  schedule:
    - cron: "45 6 * * *"   # 6:45 UTC = 7:45 AM BST (UTC+1)
  workflow_dispatch:

jobs:
  send-github-trending:
    uses: ./.github/workflows/_run-digest.yml
    secrets: inherit
    with:
      digest_name: "Daily GitHub Trending"
      script_path: "github_trending.py"
