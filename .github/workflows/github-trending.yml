name: Daily GitHub Trending

on:
  schedule:
    - cron: "45 6 * * *"   # 6:45 UTC = 7:45 AM BST (UTC+1)
  workflow_dispatch:

jobs:
  send-github-trending:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send GitHub trending to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.ALWAYSNEWS_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.ALWAYSNEWS_CHAT_ID }}
        run: python github_trending.py
